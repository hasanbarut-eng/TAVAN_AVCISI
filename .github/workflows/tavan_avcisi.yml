name: Tavan Avcisi Otomasyonu

on:
  schedule:
    # GitHub UTC saatini kullanır. TR saati için saatten 3 çıkarıyoruz.
    - cron: '15 07 * * 1-5'  # 🇹🇷 TR: 10:15 (Sabah Açılış İvmesi)
    - cron: '30 09 * * 1-5'  # 🇹🇷 TR: 12:30 (Öğle Arası - Mod Değişimi)
    - cron: '30 14 * * 1-5'  # 🇹🇷 TR: 17:30 (Kapanış Öncesi Son Fırsatlar)
    - cron: '20 15 * * 1-5'  # 🇹🇷 TR: 18:20 (Gün Sonu Özeti ve Yarın Hazırlığı)
    
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  run_analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Robotu Atesle
        run: python ana_kontrol.py
